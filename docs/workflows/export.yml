name: Authorized Web Export

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Base profile file"
        required: false
        default: "profiles/kenbiya.yml"
        type: string
      start_urls:
        description: "Authorized list/search URLs, one per line"
        required: true
        type: string
      max_pages:
        description: "Max list/search pages to follow"
        required: false
        default: "100"
        type: string
      max_items:
        description: "Max detail pages. 0 means unlimited within discovered URLs."
        required: false
        default: "0"
        type: string
      save_html:
        description: "Save raw HTML files"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KENBIYA_EMAIL: ${{ secrets.KENBIYA_EMAIL }}
      KENBIYA_PASSWORD: ${{ secrets.KENBIYA_PASSWORD }}
      WEB_EXPORT_ACKNOWLEDGE_AUTHORIZED: ${{ secrets.WEB_EXPORT_ACKNOWLEDGE_AUTHORIZED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Validate required secrets
        run: |
          test -n "$KENBIYA_EMAIL"
          test -n "$KENBIYA_PASSWORD"
          test "$WEB_EXPORT_ACKNOWLEDGE_AUTHORIZED" = "true"

      - name: Build runtime profile
        run: |
          cat > /tmp/start_urls.txt <<'EOF'
          ${{ inputs.start_urls }}
          EOF
          python scripts/build_runtime_profile.py \
            --base-profile "${{ inputs.profile }}" \
            --start-urls-file /tmp/start_urls.txt \
            --output profile.runtime.yml \
            --max-pages "${{ inputs.max_pages }}" \
            --max-items "${{ inputs.max_items }}" \
            --save-html "${{ inputs.save_html }}"

      - name: Run export
        run: |
          web-export export --profile profile.runtime.yml --output-dir outputs --acknowledge-authorization

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: authorized-web-export-outputs
          path: |
            outputs/**
            .crawler-state/**/checkpoint.json
            profile.runtime.yml
          if-no-files-found: warn
