<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Authorized Web Data Exporter Architecture</title>
  <desc id="desc">Beginner friendly architecture diagram for a generic authorized login-site data exporter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:700 34px sans-serif;fill:#0f172a}.subtitle{font:500 17px sans-serif;fill:#334155}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18;filter:url(#shadow)}.box2{fill:#ecfeff;stroke:#06b6d4;stroke-width:2;rx:18;filter:url(#shadow)}.box3{fill:#f0fdf4;stroke:#22c55e;stroke-width:2;rx:18;filter:url(#shadow)}.box4{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18;filter:url(#shadow)}.label{font:700 18px sans-serif;fill:#0f172a}.small{font:500 14px sans-serif;fill:#475569}.num{font:800 18px sans-serif;fill:#fff}.circle{fill:#2563eb}.arrow{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="54" y="58" class="title">Authorized Web Data Exporter</text>
  <text x="54" y="88" class="subtitle">ログイン型サイトから、許可されたデータを安定して取得し、CSV / Excel / JSON / TXTへ保存する汎用アーキテクチャ</text>

  <rect x="52" y="130" width="250" height="120" class="box"/>
  <circle cx="84" cy="164" r="18" class="circle"/><text x="78" y="171" class="num">1</text>
  <text x="112" y="163" class="label">設定</text>
  <text x="76" y="196" class="small">YAMLプロファイル</text>
  <text x="76" y="220" class="small">Secrets / 開始URL</text>

  <rect x="370" y="130" width="250" height="120" class="box2"/>
  <circle cx="402" cy="164" r="18" class="circle"/><text x="396" y="171" class="num">2</text>
  <text x="430" y="163" class="label">robots.txt確認</text>
  <text x="394" y="196" class="small">Allow / Disallow</text>
  <text x="394" y="220" class="small">Crawl-delay / Sitemap</text>

  <rect x="688" y="130" width="250" height="120" class="box"/>
  <circle cx="720" cy="164" r="18" class="circle"/><text x="714" y="171" class="num">3</text>
  <text x="748" y="163" class="label">ログイン</text>
  <text x="712" y="196" class="small">Playwright Chromium</text>
  <text x="712" y="220" class="small">セッション再利用</text>

  <rect x="1006" y="130" width="220" height="120" class="box3"/>
  <circle cx="1038" cy="164" r="18" class="circle"/><text x="1032" y="171" class="num">4</text>
  <text x="1066" y="163" class="label">低速巡回</text>
  <text x="1030" y="196" class="small">一覧ページ</text>
  <text x="1030" y="220" class="small">次ページ検出</text>

  <rect x="52" y="360" width="250" height="120" class="box3"/>
  <circle cx="84" cy="394" r="18" class="circle"/><text x="78" y="401" class="num">5</text>
  <text x="112" y="393" class="label">詳細URLキュー</text>
  <text x="76" y="426" class="small">重複排除</text>
  <text x="76" y="450" class="small">再開可能</text>

  <rect x="370" y="360" width="250" height="120" class="box"/>
  <circle cx="402" cy="394" r="18" class="circle"/><text x="396" y="401" class="num">6</text>
  <text x="430" y="393" class="label">抽出</text>
  <text x="394" y="426" class="small">セレクタ / 表 / DL</text>
  <text x="394" y="450" class="small">本文 / 画像 / リンク</text>

  <rect x="688" y="360" width="250" height="120" class="box4"/>
  <circle cx="720" cy="394" r="18" class="circle"/><text x="714" y="401" class="num">7</text>
  <text x="748" y="393" class="label">チェックポイント</text>
  <text x="712" y="426" class="small">取得済みURL</text>
  <text x="712" y="450" class="small">エラー保存</text>

  <rect x="1006" y="360" width="220" height="120" class="box2"/>
  <circle cx="1038" cy="394" r="18" class="circle"/><text x="1032" y="401" class="num">8</text>
  <text x="1066" y="393" class="label">出力</text>
  <text x="1030" y="426" class="small">CSV / Excel</text>
  <text x="1030" y="450" class="small">JSONL / TXT / robots</text>

  <line x1="302" y1="190" x2="366" y2="190" class="arrow"/>
  <line x1="620" y1="190" x2="684" y2="190" class="arrow"/>
  <line x1="938" y1="190" x2="1002" y2="190" class="arrow"/>
  <path d="M1116 250 C1116 310 177 300 177 356" fill="none" class="arrow"/>
  <line x1="302" y1="420" x2="366" y2="420" class="arrow"/>
  <line x1="620" y1="420" x2="684" y2="420" class="arrow"/>
  <line x1="938" y1="420" x2="1002" y2="420" class="arrow"/>

  <rect x="54" y="565" width="1172" height="92" fill="#0f172a" rx="18" opacity="0.94"/>
  <text x="84" y="604" style="font:700 20px sans-serif;fill:#fff">安定性のための約束</text>
  <text x="84" y="636" style="font:500 16px sans-serif;fill:#dbeafe">並列取得しない / 待機時間とジッターを入れる / robots.txtを確認する / CAPTCHAや制限は回避しない / 途中停止しても再開できる</text>
</svg>
