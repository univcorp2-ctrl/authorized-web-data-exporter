name: bit-court-auction
login_required: false
description: BIT 不動産競売物件情報 監視プロファイル
allowed_domains: [www.bit.courts.go.jp, bit.courts.go.jp]
start_urls: [https://www.bit.courts.go.jp/]
browser: {headless: true, navigation_timeout_ms: 45000, user_agent: null}
rate_limit: {request_delay_seconds: 5.0, request_jitter_seconds: 3.0, max_retries: 3}
limits: {max_pages: 20, max_items: 200, save_html: false}
robots: {enabled: true, user_agent: AuthorizedWebDataExporter, check_login_url: false, enforce: true, fail_closed_on_error: false, report_path: robots_report.txt}
discovery:
  detail_link_selectors: ["a[href*='auction']", "a[href*='bukken']", "a[href*='detail']", "a[href*='pdf']"]
  detail_url_regexes: ["/(?:auction|bukken|detail|keibai|pdf|file)/[^\"'# ]*"]
  next_page_selectors: ["a[rel='next']", "a:has-text('次へ')", "a:has-text('次')"]
  next_texts: ["次", "次へ", ">", "›", "»"]
extraction:
  title_selectors: ["h1", "h2", "title"]
  fields:
    - {name: case_number, labels: ["事件番号", "事件"]}
    - {name: base_price, labels: ["売却基準価額", "基準価額", "価格"]}
    - {name: address, labels: ["所在地", "住所"]}
    - {name: bid_period, labels: ["入札期間", "開札期日"]}
